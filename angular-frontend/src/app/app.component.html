<h1>{{ title }}</h1>

<h2>Items</h2>
<ul>
  <li *ngFor="let item of items">{{ item.name }} - {{ item.description }}</li>
</ul>

<input [(ngModel)]="newName" placeholder="Item name" />
<button (click)="addItem()">Add item</button>

<h2>Preview</h2>
<input (input)="updatePreview($any($event.target).value)" placeholder="Type something..." />
<!-- Intentional: rendering raw user input as HTML (XSS-prone pattern) -->
<div [innerHTML]="rawHtmlPreview"></div>
