version: "3.8"

services:
  # ---------- SonarQube ----------
  sonarqube-db:
    image: postgres:15
    networks: [devsecops-net]
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    networks: [devsecops-net]
    depends_on: [sonarqube-db]
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs

  # ---------- Dependency-Track ----------
  dtrack-apiserver:
    image: dependencytrack/apiserver
    networks: [devsecops-net]
    ports:
      - "8081:8080"
    volumes:
      - dtrack_data:/data
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend
    networks: [devsecops-net]
    depends_on: [dtrack-apiserver]
    environment:
      API_BASE_URL: http://localhost:8081
    ports:
      - "8080:8080"
    restart: unless-stopped

networks:
  devsecops-net:
    driver: bridge

volumes:
  sonar_db:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  dtrack_data:
